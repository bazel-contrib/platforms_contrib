name: Build prebuilt detector binaries

# Manually triggered: each run cuts an independent release of the host
# detector binaries pinned to the current commit. Module releases live on
# their own tag scheme (`v*`); detector releases use `detector-<short_sha>`
# so the two never collide.
on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prebuilt-detector-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          sha="$(git rev-parse HEAD)"
          short="$(git rev-parse --short=12 HEAD)"
          {
            echo "sha=${sha}"
            echo "short_sha=${short}"
            echo "tag=detector-${short}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.target }}

      - name: Build detector
        shell: bash
        run: |
          bazel build //private/detector:detector_${{ matrix.target }} \
            -c opt --strip=always

      - name: Stage artifact
        shell: bash
        run: |
          src="bazel-bin/private/detector/detector_${{ matrix.target }}"
          mkdir -p out
          cp "${src}" "out/detector-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: detector-${{ matrix.target }}
          path: out/detector-${{ matrix.target }}

  release:
    name: Publish release & open prebuilts PR
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA-256 manifest
        run: |
          cd artifacts
          shasum -a 256 detector-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          {
            echo "Prebuilt host detector binaries pinned to commit ${{ needs.prepare.outputs.sha }}."
            echo ""
            echo "## SHA-256"
            echo ""
            echo '```'
            cat artifacts/SHA256SUMS
            echo '```'
          } > NOTES.md
          (cd artifacts && gh release create "${tag}" \
            --target "${{ needs.prepare.outputs.sha }}" \
            --title "${tag}" \
            --notes-file ../NOTES.md \
            detector-*)

      - name: Regenerate prebuilts.json
        run: |
          python3 .github/scripts/update_detector_index.py \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --shas artifacts/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --output private/detector/prebuilts.json

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          branch="bot/update-detector-${{ needs.prepare.outputs.short_sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add private/detector/prebuilts.json
          if git diff --cached --quiet; then
            echo "prebuilts.json is already up to date; nothing to PR."
            exit 0
          fi
          git commit -m "Pin detector binaries to ${tag}"
          git push -u origin "${branch}"
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "${branch}" \
            --title "Pin detector binaries to ${tag}" \
            --body "Auto-generated by the prebuilt-detector workflow. See release [${tag}](../../releases/tag/${tag})."
